# 代码检测规则配置
# 用于静态分析中的模式匹配

# 数据来源检测规则
data_sources:
  file:
    - "open("
    - "read"
    - "load"
    - "Path("
    - "file"
    - ".read_text"
    - ".read_bytes"
  
  network:
    - "requests."
    - "urllib"
    - "http"
    - "socket"
    - "fetch"
    - "download"
  
  database:
    - "sql"
    - "query"
    - "cursor"
    - "connect"
    - "session"
    - "execute"
  
  user_input:
    - "input("
    - "argv"
    - "args."
    - "click."
    - "argparse"
    - "stdin"
  
  environment:
    - "environ"
    - "getenv"
    - "os.env"
    - "ENV"

# 数据格式检测规则
data_formats:
  json:
    - "json."
    - ".json"
    - "JSON"
    - "json.load"
    - "json.dumps"
  
  yaml:
    - "yaml."
    - ".yaml"
    - ".yml"
    - "YAML"
    - "yaml.load"
  
  pickle:
    - "pickle."
    - ".pkl"
    - ".pickle"
    - "pickle.load"
  
  csv:
    - "csv."
    - ".csv"
    - "pandas.read_csv"
    - "DictReader"
  
  xml:
    - "xml."
    - ".xml"
    - "ElementTree"
    - "parseString"
  
  protobuf:
    - ".proto"
    - "protobuf"
    - "pb2"
    - "ParseFromString"
  
  binary:
    - ".bin"
    - "struct.pack"
    - "struct.unpack"
    - "bytes"
  
  parquet:
    - ".parquet"
    - "read_parquet"
    - "to_parquet"
  
  hdf5:
    - ".h5"
    - ".hdf5"
    - "h5py"

# 数据处理操作检测规则
processing_operations:
  parse:
    - "parse"
    - "parser"
    - "parsing"
  
  validate:
    - "validate"
    - "validator"
    - "validation"
    - "check"
  
  transform:
    - "transform"
    - "convert"
    - "map"
    - "filter"
  
  serialize:
    - "serialize"
    - "dump"
    - "dumps"
    - "to_json"
    - "to_dict"
  
  deserialize:
    - "deserialize"
    - "load"
    - "loads"
    - "from_json"
    - "from_dict"
  
  encode:
    - "encode"
    - "encoding"
  
  decode:
    - "decode"
    - "decoding"
  
  compress:
    - "compress"
    - "zip"
    - "gzip"
  
  encrypt:
    - "encrypt"
    - "cipher"
    - "crypto"


# 软件画像分析器配置
analyzer_config:
  # 文件扫描配置
  file_extensions:
    - .py
    - .js
    - .ts
    - .java
    - .go
    - .rb
    - .php
    - .c
    - .cpp
    - .rs
  
  # 排除目录
  exclude_dirs:
    - __pycache__
    - node_modules
    - .git
    - .venv
    - venv
    - env
    - build
    - dist
    - .eggs
    - "*.egg-info"
  
  # 是否启用LLM对每个文件进行摘要分析
  enable_llm_file_summary: false
  
  # 文件摘要分析使用的LLM配置（可选）
  # 如果不配置，则使用主 LLM 客户端
  # 可以配置为更便宜/更快的模型来降低成本
  file_summary_llm:
    # 是否启用单独的LLM（设为 false 则使用主 LLM）
    enabled: false
    # LLM 提供商：deepseek, openai, lab, anthropic 等
    provider: lab
    # 模型名称（可选，不填则使用提供商默认模型）
    model: ""
    # 温度参数
    temperature: 0.7
    # 最大token数
    max_tokens: 65536

# =============================================================================
# 模块分析器配置
# =============================================================================
module_analyzer_config:
  # 模块分析器类型
  # - "skill": 基于 .claude/skills/ai-infra-module-modeler 的 taxonomy + LLM 语义判断 (推荐)
  # - "agent": 基于 LLM agent 的灵活分析器（适用于需要更灵活分析的场景）
  analyzer_type: skill
  
  # 最大 LLM 调用次数（在单个分析 turn 内允许的最大 LLM 调用次数）
  # agent 分析器使用此配置：整个仓库模块分析允许的最大 LLM 调用次数
  max_agent_iterations: 100
  
  # 读取文件内容的最大长度
  max_file_content_length: 10000

  # Skill-based analyzer scanning limits
  # - max_key_functions: 模块关键函数数量上限
  skill_max_key_functions: 12
  
  # 是否跳过空文件夹
  skip_empty_folders: true
  
  # 成为模块的最小文件数
  min_files_for_module: 1
  
  # 排除的文件夹列表（支持通配符模式）
  # 这些文件夹会被完全忽略，不会被分析为模块
  excluded_folders:

    # 版本控制
    - ".git"
    - ".svn"
    - ".hg"
    
    # Python 相关
    - "__pycache__"
    - ".pytest_cache"
    - ".mypy_cache"
    - ".ruff_cache"
    - "*.egg-info"
    - ".eggs"
    - ".tox"
    - ".nox"
    - ".venv"
    - "venv"
    - "env"
    - ".env"
    - "virtualenv"
    - "site-packages"
    
    # Node.js / JavaScript
    - "node_modules"
    - "bower_components"
    - ".npm"
    - ".yarn"
    
    # Build outputs
    - "build"
    - "dist"
    - "out"
    - "target"
    - "_build"
    
    # IDE / Editor
    - ".idea"
    - ".vscode"
    - ".vs"
    - ".eclipse"
    - ".settings"
    
    # Documentation build
    - "docs/_build"
    - "docs"
    - "doc"
    - "examples"
    - "example"
    - "benchmarks"
    - "benchmark"
    - "tests"
    - "test"
    - "_site"
    - "site"
    
    # Coverage / Testing
    - "coverage"
    - "htmlcov"
    - ".coverage"
    
    # 临时文件
    - ".cache"
    - ".tmp"
    - "tmp"
    - "temp"
    - "logs"
    
    # CI/CD
    - ".github"
    - ".gitlab"
    - ".circleci"
    - ".travis"
    
    # Container
    - ".docker"
    
    # 其他
    - ".DS_Store"
    - "Thumbs.db"
    - "*.bak"
    - "*.swp"
  
  # 代码文件扩展名（只有这些扩展名的文件会被视为代码文件）
  code_extensions:
    # Python
    - ".py"
    - ".pyx"
    - ".pyi"
    
    # JavaScript / TypeScript
    - ".js"
    - ".jsx"
    - ".ts"
    - ".tsx"
    - ".mjs"
    - ".cjs"
    
    # JVM
    - ".java"
    - ".kt"
    - ".scala"
    
    # Go
    - ".go"
    
    # Rust
    - ".rs"
    
    # C/C++
    - ".c"
    - ".cpp"
    - ".cc"
    - ".cxx"
    - ".h"
    - ".hpp"
    
    # C#
    - ".cs"
    
    # Ruby
    - ".rb"
    
    # PHP
    - ".php"
    
    # Swift
    - ".swift"
    
    # R
    - ".r"
    - ".R"
    
    # Julia
    - ".jl"
    
    # Lua
    - ".lua"
    
    # Shell
    - ".sh"
    - ".bash"
    
    # SQL
    - ".sql"

# RepoAnalyzer 深度静态分析配置
repo_analyzer_config:
  # 编程语言（"auto" 为自动检测，或指定 "python", "javascript" 等）
  language: auto
  
  # 数据流切片最大深度
  max_slice_depth: 3
  
  # 每个切片最多包含的文件数
  max_slice_files: 10
  
  # 是否强制重建缓存（设为 true 会忽略已有缓存）
  rebuild_cache: false

# 仓库文件检测配置
repo_files:
  # README 文件名列表（按优先级排序）
  readme_files:
    - README.md
    - README.rst
    - README.txt
    - README
  
  # 依赖配置文件列表
  dependency_files:
    - pyproject.toml
    - setup.py
    - setup.cfg
    - package.json
    - requirements.txt
    - Pipfile
    - Cargo.toml
    - go.mod
    - pom.xml
